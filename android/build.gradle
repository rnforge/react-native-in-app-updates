buildscript {
  repositories {
    google()
    mavenCentral()
  }

  dependencies {
    classpath "com.android.tools.build:gradle:8.8.0"
  }
}

def reactNativeArchitectures() {
  def value = rootProject.getProperties().get("reactNativeArchitectures")
  return value ? value.split(",") : ["armeabi-v7a", "x86", "x86_64", "arm64-v8a"]
}

def isNewArchitectureEnabled() {
  return rootProject.hasProperty("newArchEnabled") && rootProject.getProperty("newArchEnabled") == "true"
}

apply plugin: "com.android.library"
apply plugin: 'org.jetbrains.kotlin.android'
apply plugin: 'jacoco'
apply from: '../nitrogen/generated/android/InAppUpdates+autolinking.gradle'
apply from: "./fix-prefab.gradle"

if (isNewArchitectureEnabled()) {
  apply plugin: "com.facebook.react"
}

def getExtOrDefault(name) {
  return rootProject.ext.has(name) ? rootProject.ext.get(name) : project.properties["InAppUpdates_" + name]
}

def getExtOrIntegerDefault(name) {
  return rootProject.ext.has(name) ? rootProject.ext.get(name) : (project.properties["InAppUpdates_" + name]).toInteger()
}

android {
  namespace "dev.rnforge.inappupdates"

  ndkVersion getExtOrDefault("ndkVersion")
  compileSdkVersion getExtOrIntegerDefault("compileSdkVersion")

  defaultConfig {
    minSdkVersion getExtOrIntegerDefault("minSdkVersion")
    targetSdkVersion getExtOrIntegerDefault("targetSdkVersion")
    buildConfigField "boolean", "IS_NEW_ARCHITECTURE_ENABLED", isNewArchitectureEnabled().toString()

    externalNativeBuild {
      cmake {
        cppFlags "-frtti -fexceptions -Wall -Wextra -fstack-protector-all"
        arguments "-DANDROID_STL=c++_shared", "-DANDROID_SUPPORT_FLEXIBLE_PAGE_SIZES=ON"
        abiFilters (*reactNativeArchitectures())

        buildTypes {
          debug {
            cppFlags "-O1 -g"
          }
          release {
            cppFlags "-O2"
          }
        }
      }
    }
  }

  externalNativeBuild {
    cmake {
      path "CMakeLists.txt"
    }
  }

  packagingOptions {
    excludes = [
        "META-INF",
        "META-INF/**",
        "**/libc++_shared.so",
        "**/libfbjni.so",
        "**/libjsi.so",
        "**/libfolly_json.so",
        "**/libfolly_runtime.so",
        "**/libglog.so",
        "**/libhermes.so",
        "**/libhermes-executor-debug.so",
        "**/libhermes_executor.so",
        "**/libreactnative.so",
        "**/libreactnativejni.so",
        "**/libturbomodulejsijni.so",
        "**/libreact_nativemodule_core.so",
        "**/libjscexecutor.so"
    ]
  }

  buildFeatures {
    buildConfig true
    prefab true
  }

  buildTypes {
    release {
      minifyEnabled false
    }
  }

  lintOptions {
    disable "GradleCompatible"
  }

  compileOptions {
    sourceCompatibility JavaVersion.VERSION_1_8
    targetCompatibility JavaVersion.VERSION_1_8
  }

  testOptions {
    unitTests.all {
      jacoco {
        includeNoLocationClasses = true
        excludes = ['jdk.internal.*']
      }
    }
  }

  sourceSets {
    main {
      if (isNewArchitectureEnabled()) {
        java.srcDirs += [
          // React Codegen files
          "${project.buildDir}/generated/source/codegen/java"
        ]
      }
    }
  }
}

repositories {
  mavenCentral()
  google()
}

jacoco {
  toolVersion = "0.8.12"
}

tasks.register("jacocoDebugUnitTestReport", JacocoReport) {
  dependsOn "testDebugUnitTest"

  reports {
    xml.required = true
    html.required = true
    csv.required = false
  }

  def coverageExcludes = [
      "**/BuildConfig.*",
      "**/R.class",
      '**/R$*.class',
      "**/com/margelo/nitro/**",
      "**/HybridInAppUpdates*",
      "**/InAppUpdatesPackage*",
      "**/InAppUpdatesActivityProvider*"
  ]

  classDirectories.setFrom(files([
      fileTree(dir: "$buildDir/tmp/kotlin-classes/debug", excludes: coverageExcludes),
      fileTree(dir: "$buildDir/intermediates/javac/debug/classes", excludes: coverageExcludes)
  ]))
  sourceDirectories.setFrom(files("src/main/java"))
  executionData.setFrom(fileTree(dir: buildDir, includes: [
      "outputs/unit_test_code_coverage/debugUnitTest/testDebugUnitTest.exec",
      "jacoco/testDebugUnitTest.exec"
  ]))
}


dependencies {
  // For < 0.71, this will be from the local maven repo
  // For > 0.71, this will be replaced by `com.facebook.react:react-android:$version` by react gradle plugin
  //noinspection GradleDynamicVersion
  implementation "com.facebook.react:react-native:+"

  // Add a dependency on NitroModules
  implementation project(":react-native-nitro-modules")

  // Google Play In-App Updates
  implementation "com.google.android.play:app-update:2.1.0"

  // Play Core testing support for FakeAppUpdateManager in JVM tests.
  testImplementation "com.google.android.play:app-update:2.1.0"

  // Google Play Services (for GoogleApiAvailability)
  implementation "com.google.android.gms:play-services-base:18.10.0"

  // Testing
  testImplementation 'junit:junit:4.13.2'
  testImplementation "org.robolectric:robolectric:4.16.1"
  testImplementation "org.mockito:mockito-core:5.23.0"
  testImplementation "androidx.test:core:1.7.0"
}

if (isNewArchitectureEnabled()) {
  react {
    jsRootDir = file("../src/")
    libraryName = "InAppUpdates"
    codegenJavaPackageName = "dev.rnforge.inappupdates"
  }
}
